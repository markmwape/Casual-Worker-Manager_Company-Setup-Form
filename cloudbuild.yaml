steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '--platform=linux/amd64', '-t', 'gcr.io/$PROJECT_ID/casual-worker-manager:latest', '.']
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/casual-worker-manager:latest']
  
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'casual-worker-manager'
      - '--image'
      - 'gcr.io/$PROJECT_ID/casual-worker-manager:latest'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300'
      - '--concurrency'
      - '80'
      - '--max-instances'
      - '10'
      - '--min-instances'
      - '0'
      - '--port'
      - '8080'
      - '--set-env-vars'
      - 'DATABASE_URL=postgresql://embee-accounting:EmbeeMarkSQL2024!@/embee-accounting?host=/cloudsql/embee-accounting:us-central1:embee-accounting'
      - '--set-env-vars'
      - 'CLOUD_SQL_CONNECTION_NAME=embee-accounting:us-central1:embee-accounting'
      - '--add-cloudsql-instances'
      - 'embee-accounting:us-central1:embee-accounting'

images:
  - 'gcr.io/$PROJECT_ID/casual-worker-manager:latest' 