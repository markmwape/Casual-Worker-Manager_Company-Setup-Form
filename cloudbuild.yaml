steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/casual-worker-manager:latest', '.']
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/casual-worker-manager:latest']
  
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'casual-worker-manager-company-setup-form'
      - '--image'
      - 'gcr.io/$PROJECT_ID/casual-worker-manager:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300'
      - '--concurrency'
      - '80'
      - '--max-instances'
      - '10'
      - '--min-instances'
      - '0'
      - '--port'
      - '8080'
      - '--set-env-vars'
      - 'CLOUD_SQL_CONNECTION_NAME=embee-accounting:us-central1:casual-worker-db'
      - '--set-env-vars'
      - 'DB_USER=casual_worker_user'
      - '--set-env-vars'
      - 'DB_PASS=Embeeaccounting2030'
      - '--set-env-vars'
      - 'DB_NAME=casual_worker_db'
      - '--add-cloudsql-instances'
      - 'embee-accounting:us-central1:casual-worker-db'

images:
  - 'gcr.io/$PROJECT_ID/casual-worker-manager:latest' 