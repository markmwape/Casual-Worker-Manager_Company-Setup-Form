<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Test</title>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        
        // New Firebase config for ember-accounting project
        const firebaseConfig = {
            apiKey: "AIzaSyD9_N_0ve9ABFwwnTBn1N2oxlUs6xbT-No",
            authDomain: "ember-accounting.firebaseapp.com",
            projectId: "ember-accounting",
            storageBucket: "ember-accounting.firebasestorage.app",
            messagingSenderId: "328324461979",
            appId: "1:328324461979:web:0cc9ddad6aa3f157359d3e",
            measurementId: "G-F1XTE0TP63"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        console.log('Firebase initialized:', !!auth);
        
        // Test Google sign-in
        window.testGoogleSignIn = async () => {
            try {
                const provider = new GoogleAuthProvider();
                const result = await signInWithPopup(auth, provider);
                console.log('Google sign-in successful:', result.user.email);
                document.getElementById('result').textContent = 'Success: ' + result.user.email;
            } catch (error) {
                console.error('Google sign-in failed:', error);
                document.getElementById('result').textContent = 'Error: ' + error.message;
            }
        };
    </script>
</head>
<body>
    <h1>Authentication Test</h1>
    <button onclick="testGoogleSignIn()">Test Google Sign-in</button>
    <div id="result"></div>
</body>
</html>
