<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Test</title>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        
        // Simple Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyAo1ZFRueQ9nNFbiSF7uGYtgLuMfUWxKXk",
            authDomain: "casual-worker-webapp.firebaseapp.com",
            projectId: "casual-worker-webapp",
            storageBucket: "casual-worker-webapp.firebasestorage.app",
            messagingSenderId: "862237032997",
            appId: "1:862237032997:web:664c895b925d4a024cb5cc",
            measurementId: "G-NMJ9104E0M"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        console.log('Firebase initialized:', !!auth);
        
        // Test Google sign-in
        window.testGoogleSignIn = async () => {
            try {
                const provider = new GoogleAuthProvider();
                const result = await signInWithPopup(auth, provider);
                console.log('Google sign-in successful:', result.user.email);
                document.getElementById('result').textContent = 'Success: ' + result.user.email;
            } catch (error) {
                console.error('Google sign-in failed:', error);
                document.getElementById('result').textContent = 'Error: ' + error.message;
            }
        };
    </script>
</head>
<body>
    <h1>Authentication Test</h1>
    <button onclick="testGoogleSignIn()">Test Google Sign-in</button>
    <div id="result"></div>
</body>
</html>
